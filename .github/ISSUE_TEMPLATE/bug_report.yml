name: Bug Report
description: Report a bug in Whetstone
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `whetstone build "..."`, it crashes with...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1. Run `whetstone`
        2. Type `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any error messages or tracebacks.
      render: shell

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      options:
        - OpenRouter
        - OpenAI
        - Anthropic
        - Ollama
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information or screenshots that might help solve this bug.
